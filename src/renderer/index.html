<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Status Light</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="status-plane" aria-live="polite" data-tauri-drag-region>
        <div class="traffic-light" aria-label="Agent status light" data-tauri-drag-region>
          <div class="lamp lamp-red" data-mode="error"><span></span></div>
          <div class="lamp lamp-yellow" data-mode="working"><span></span></div>
          <div class="lamp lamp-green active" data-mode="idle"><span></span></div>
        </div>
      </section>
    </main>
    <script src="./renderer.js"></script>
  </body>
</html>
